<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Your Account</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Join Our Community</h1>
        <p>Fill out the form below to register.</p>
        <form id="registration-form" aria-label="registration-form">
            <div class="form-group">
                <label for="first-name">First Name</label>
                <input type="text" id="full-name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email-addr">Your Email</label>
                <input type="email" id="email-addr" name="email" placeholder="john@example.com" required>
            </div>
            <button type="submit" id="register-new-user-btn">Create Account</button>
        </form>
    </div>
</body>

</html>
